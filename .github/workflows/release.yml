name: 'Release: Build & Package App'

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - platform: 'windows-latest'
            build-args: '--bundles nsis'
            target: ''
            asset-prefix: '01'
          # Windows ARM64 (use cross-compilation on windows-latest)
          - platform: 'windows-latest'
            build-args: '--bundles nsis'
            target: 'aarch64-pc-windows-msvc'
            asset-prefix: '01_arm'
          # macOS Apple Silicon (M1/M2/M3)
          - platform: 'macos-14'
            target: aarch64-apple-darwin
            asset-prefix: '02'
          # macOS Intel (use macos-13 for Intel)
          - platform: 'macos-13'
            target: x86_64-apple-darwin
            asset-prefix: '02_intel'
          # Ubuntu x64
          - platform: 'ubuntu-22.04'
            target: ''
            asset-prefix: '03'
          # Ubuntu 24.04 x64
          - platform: 'ubuntu-24.04'
            target: ''
            asset-prefix: '03_24'
          # Android ARM64
          - platform: 'ubuntu-latest'
            mobile: 'android'
            target: 'aarch64-linux-android'
            build-args: '--target aarch64'
            asset-prefix: '04'
    uses: ./.github/workflows/build.yml
    with:
      release-id: ${{ github.event.release.id || '' }}
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.build-args }}
      asset-name-pattern: '[name]_v[version]_[platform]_[arch][ext]'
      asset-prefix: ${{ matrix.asset-prefix }}
      mobile: ${{ matrix.mobile }}
    secrets: inherit
    permissions:
      contents: write
