name: 'Release: Build & Package App'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag-name:
        description: 'Tag name for release (e.g. v1.8.18)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - platform: 'windows-latest'
            build-args: '--bundles nsis'
            target: ''
            asset-prefix: '01'
          # Windows ARM64 (native build on ARM runner)
          - platform: 'windows-11-arm'
            build-args: '--bundles nsis'
            target: ''
            asset-prefix: '01_arm'
          # macOS Apple Silicon (M1/M2/M3)
          - platform: 'macos-14'
            build-args: ''
            target: aarch64-apple-darwin
            asset-prefix: '02'
          # macOS Intel
          - platform: 'macos-13'
            build-args: ''
            target: x86_64-apple-darwin
            asset-prefix: '02_intel'
          # Ubuntu x64
          - platform: 'ubuntu-22.04'
            build-args: ''
            target: ''
            asset-prefix: '03'
          # Ubuntu 24.04 x64
          - platform: 'ubuntu-24.04'
            build-args: ''
            target: ''
            asset-prefix: '03_24'
          # Android ARM64
          - platform: 'ubuntu-latest'
            mobile: 'android'
            target: 'aarch64-linux-android'
            build-args: ''
            asset-prefix: '04'
    uses: ./.github/workflows/build.yml
    with:
      release-id: ${{ github.event.release.id || '' }}
      tag-name: ${{ inputs.tag-name || github.event.release.tag_name || github.ref_name }}
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.build-args }}
      asset-name-pattern: '[name]_v[version]_[platform]_[arch][ext]'
      asset-prefix: ${{ matrix.asset-prefix }}
      mobile: ${{ matrix.mobile }}
    secrets: inherit
    permissions:
      contents: write
