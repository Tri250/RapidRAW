name: build

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      target:
        required: true
        type: string
      build-args:
        required: false
        type: string
      release-id:
        required: false
        type: string
      asset-prefix:
        required: false
        type: string
      asset-name-pattern:
        required: false
        type: string
      upload-artifacts:
        required: false
        type: boolean
      repository:
        required: false
        type: string
      ref:
        required: false
        type: string
      mobile:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.platform }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ inputs.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ inputs.mobile != '' && format('{0}-{1}', inputs.platform, inputs.mobile) || inputs.platform }}${{ inputs.target != '' && format('-{0}', inputs.target) || '' }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install additional system dependencies (Linux)
        if: runner.os == 'Linux' && inputs.mobile == ''
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install LLVM and Clang (Windows)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "19"
          directory: ${{ runner.temp }}/llvm

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "LIBCLANG_PATH=${{ runner.temp }}/llvm/bin" >> $GITHUB_ENV

      # ------------- Android Setup -------------
      - name: Set up JDK
        if: inputs.mobile == 'android'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        if: inputs.mobile == 'android'
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        if: inputs.mobile == 'android'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          link-to-sdk: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Android signing
        if: inputs.mobile == 'android' && github.event_name != 'pull_request'
        run: |
          cd src-tauri/gen/android
          keytool -genkey -v \
            -keystore "$RUNNER_TEMP/rawworkshop-release.jks" \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -alias rawworkshop \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=RAW工坊, OU=Dev, O=RAW工坊, ST=China, C=CN" \
            -noprompt
          echo "keyAlias=rawworkshop" > keystore.properties
          echo "password=android123" >> keystore.properties
          echo "storeFile=$RUNNER_TEMP/rawworkshop-release.jks" >> keystore.properties

      - id: patch-release-name
        shell: bash
        run: |
          platform="${{ inputs.platform }}"
          if [[ "${{ inputs.mobile }}" == "android" ]]; then
            replacement="android"
          else
            replacement="$(echo "${platform}" | sed -E 's/-latest//' | sed -E 's/windows-11-arm/windows-arm64/' | sed -E 's/windows$/windows-x64/')"
          fi
          if [[ -n "${{ inputs.asset-name-pattern }}" ]]; then
            patched_platform=$(echo '${{ inputs.asset-name-pattern }}' | sed -E "s/\[platform\]/${replacement}/")
          else
            patched_platform="${replacement}"
          fi
          if [[ -n "${{ inputs.asset-prefix }}" ]]; then
            patched_platform="${{ inputs.asset-prefix }}_${patched_platform}"
          fi
          echo "platform=${patched_platform}" >> "$GITHUB_OUTPUT"

      - id: tauri-build
        name: Build with tauri-action
        if: inputs.mobile == ''
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: ${{ startsWith(inputs.platform, 'ubuntu') }}
        with:
          args: --verbose${{ inputs.build-args && format(' {0}', inputs.build-args) || '' }}${{ inputs.target != '' && format(' --target {0}', inputs.target) || '' }}
          assetNamePattern: ${{ steps.patch-release-name.outputs.platform }}
          releaseId: ${{ inputs.release-id }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('RAW 工坊 {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false
          retryAttempts: 3

      - name: Build Android
        if: inputs.mobile == 'android'
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ORT_SKIP_DOWNLOAD: '1'
          ORT_LIB_LOCATION: ${{ format('{0}/src-tauri/libs/arm64-v8a', github.workspace) }}
          ORT_STRATEGY: manual
          # 16KB max-page-size for Android 15+ compatibility (16KB page devices like Pixel 8+)
          CARGO_TARGET_AARCH64_LINUX_ANDROID_RUSTFLAGS: -C link-arg=-Wl,-z,max-page-size=16384
        run: |
          # tauri android build --target accepts short names (aarch64, armv7, i686, x86_64)
          # while Rust toolchain setup needs the full triple (e.g. aarch64-linux-android)
          target_arg=""
          if [[ -n "${{ inputs.target }}" ]]; then
            tauri_target="${{ inputs.target }}"
            # Strip everything after the first hyphen to get the short name
            tauri_target="${tauri_target%%-*}"
            target_arg="--target $tauri_target"
          fi
          npx tauri android build --verbose ${target_arg}${{ inputs.build-args && format(' {0}', inputs.build-args) || '' }}

      - name: Prepare Android Release Assets
        if: inputs.mobile == 'android' && (inputs.release-id != '' || startsWith(github.ref, 'refs/tags/'))
        shell: bash
        run: |
          set -euo pipefail

          stage_dir="$RUNNER_TEMP/android-release-assets"
          mkdir -p "$stage_dir"

          app_name="RAW-Workshop"
          version="$(node -e "const fs=require('fs'); const conf=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); process.stdout.write(conf.version || '')")"
          arch="${{ inputs.target }}"
          arch="${arch%%-*}"
          template='${{ steps.patch-release-name.outputs.platform }}'

          find src-tauri/gen/android/app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) | while read -r file; do
            ext=".${file##*.}"
            asset_name="${template//\[name\]/$app_name}"
            asset_name="${asset_name//\[version\]/$version}"
            asset_name="${asset_name//\[arch\]/$arch}"
            asset_name="${asset_name//\[ext\]/$ext}"
            cp "$file" "$stage_dir/$asset_name"
          done

      - name: Upload Android Release Assets
        if: inputs.mobile == 'android' && (inputs.release-id != '' || startsWith(github.ref, 'refs/tags/'))
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag_name="${{ github.event.release.tag_name || github.ref_name }}"
          gh release upload "$tag_name" "$RUNNER_TEMP"/android-release-assets/* --clobber

      - name: Upload Android Artifacts
        if: inputs.mobile == 'android' && inputs.release-id == '' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.asset-prefix }}_android${{ inputs.target && format('_{0}', inputs.target) || '' }}_artifacts
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

      - name: Upload Windows Artifacts
        if: startsWith(inputs.platform, 'windows') && inputs.release-id == '' && inputs.mobile == ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.asset-prefix }}_${{ inputs.platform }}${{ inputs.target && format('_{0}', inputs.target) || '' }}_artifacts
          path: |
            src-tauri/target/${{ inputs.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ inputs.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

      - name: Upload Linux/macOS Artifacts
        if: ${{ !startsWith(inputs.platform, 'windows') && inputs.release-id == '' && inputs.mobile == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.asset-prefix }}_${{ inputs.platform }}${{ inputs.target && format('_{0}', inputs.target) || '' }}_artifacts
          path: |
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.rpm
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.deb
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.AppImage
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.dmg
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn
