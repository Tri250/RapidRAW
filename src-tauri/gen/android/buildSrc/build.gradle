plugins {
    id 'java-gradle-plugin'
}

gradlePlugin {
    plugins {
        pluginsForCoolKids {
            id = 'rust'
            implementationClass = 'RustPlugin'
        }
    }
}

repositories {
    google()
    mavenCentral()
    gradlePluginPortal()
}

dependencies {
    compileOnly gradleApi()
    implementation 'com.android.tools.build:gradle:8.11.0'
}